<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirectDrop - P2P File Transfer</title>
    
    <!-- 1. Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. React Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 3. Babel Standalone (Transpiles React JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 4. PeerJS (Replaces Firebase for WebRTC Signaling) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <!-- 5. StreamSaver (For Live Streaming Downloads directly to disk) -->
    <script src="https://cdn.jsdelivr.net/npm/streamsaver@2.0.5/StreamSaver.min.js"></script>

    <style>
        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(1rem); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInSlideLeft {
            from { opacity: 0; transform: translateX(1rem); }
            to { opacity: 1; transform: translateX(0); }
        }
        .slide-up { animation: fadeInSlideUp 0.5s ease-out forwards; }
        .slide-right { animation: fadeInSlideLeft 0.3s ease-out forwards; }
        
        /* Custom scrollbar for file list */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-white text-slate-900 font-sans min-h-screen flex flex-col items-center p-6">

    <div id="root" class="w-full max-w-2xl flex flex-col items-center"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // Prefix to prevent ID collisions on the public PeerJS server
        const APP_PREFIX = 'directdrop-v1-';

        // --- Inline SVG Icon Components ---
        const IconShare = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconFile = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
        const IconFileCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg>;
        const IconCopy = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
        const IconLoader = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
        const IconFiles = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>;

        // Helper function to dynamically format bytes to KB, MB, GB, etc.
        const formatBytes = (bytes, decimals = 2) => {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        };

        function App() {
            const [mode, setMode] = useState('idle'); 
            const [connectionState, setConnectionState] = useState('disconnected'); 
            const [pairingCode, setPairingCode] = useState('');
            const [errorMessage, setErrorMessage] = useState('');
            const [progress, setProgress] = useState(0);
            
            // Multiple Files State
            const [selectedFiles, setSelectedFiles] = useState([]);
            const [fileManifest, setFileManifest] = useState([]); 
            const [currentFileIndex, setCurrentFileIndex] = useState(0);
            const [isDragging, setIsDragging] = useState(false);

            const peerRef = useRef(null);
            const connRef = useRef(null);
            
            const receiveBufferRef = useRef(null); 
            const writerRef = useRef(null); 
            const receivedSizeRef = useRef(0);
            const receivedFileMetaRef = useRef(null);
            const dragCounterRef = useRef(0); // Fixes UI flicker when dragging over child elements

            const cleanupWebRTC = () => {
                if (connRef.current) {
                    connRef.current.close();
                    connRef.current = null;
                }
                if (peerRef.current) {
                    peerRef.current.destroy();
                    peerRef.current = null;
                }
                
                if (writerRef.current) {
                    try { writerRef.current.abort(); } catch(e) {}
                    writerRef.current = null;
                }
                
                receiveBufferRef.current = null;
                receivedSizeRef.current = 0;
                receivedFileMetaRef.current = null;
            };

            const resetApp = () => {
                cleanupWebRTC();
                setMode('idle');
                setConnectionState('disconnected');
                setPairingCode('');
                setErrorMessage('');
                setProgress(0);
                setSelectedFiles([]);
                setFileManifest([]);
                setCurrentFileIndex(0);
                setIsDragging(false);
                dragCounterRef.current = 0;
            };

            // 1. SENDER LOGIC (Host)
            const startHosting = () => {
                if (selectedFiles.length === 0) return;
                setMode('send');
                setConnectionState('connecting');
                setErrorMessage('');
                
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setPairingCode(code);

                const peer = new Peer(APP_PREFIX + code);
                peerRef.current = peer;

                peer.on('connection', (conn) => {
                    // Prevent hijacking. Reject new connections if already connected
                    if (connRef.current) {
                        conn.on('open', () => {
                            conn.send({ type: 'error', message: 'This pairing code is already in use by someone else.' });
                            setTimeout(() => conn.close(), 500);
                        });
                        return;
                    }

                    connRef.current = conn;
                    
                    conn.on('open', () => {
                        setConnectionState('connected');
                        conn.send({ type: 'manifest', files: fileManifest });
                        setTimeout(() => sendNextFile(conn, 0), 1000);
                    });
                    
                    conn.on('close', () => {
                        if (connectionState !== 'completed') setConnectionState('disconnected');
                        // Free the room if receiver disconnects prematurely
                        connRef.current = null;
                    });
                });

                peer.on('error', (err) => {
                    console.error(err);
                    setErrorMessage("Failed to start session. Network error.");
                    setMode('send_setup');
                });
            };

            const sendNextFile = (conn, index) => {
                // Check if connection was closed manually before trying to send
                if (!conn || !conn.open) return;

                if (index >= selectedFiles.length) {
                    conn.send({ type: 'all_done' });
                    setConnectionState('completed');
                    return;
                }

                setCurrentFileIndex(index);
                setConnectionState('transferring');
                
                const file = selectedFiles[index];
                const chunkSize = 65536; 
                let offset = 0;

                conn.send({ 
                    type: 'meta', 
                    name: file.name, 
                    size: file.size, 
                    mimeType: file.type,
                    fileIndex: index
                });

                const readNextChunk = () => {
                    // Safe guard: If receiver disconnects abruptly, stop reading
                    if (!conn || !conn.open) {
                        setErrorMessage("Connection lost. Receiver may have disconnected.");
                        setConnectionState('disconnected');
                        return;
                    }

                    if (conn.dataChannel && conn.dataChannel.bufferedAmount > 1024 * 1024 * 2) {
                        setTimeout(readNextChunk, 50);
                        return;
                    }

                    const slice = file.slice(offset, offset + chunkSize);
                    slice.arrayBuffer().then((buffer) => {
                        try {
                            conn.send(buffer);
                            offset += buffer.byteLength;
                            setProgress(Math.min(100, Math.round((offset / file.size) * 100)));

                            if (offset < file.size) {
                                readNextChunk();
                            } else {
                                conn.send({ type: 'eof' });
                                setTimeout(() => sendNextFile(conn, index + 1), 1500);
                            }
                        } catch (e) {
                            console.error("Chunk send error", e);
                            setConnectionState('disconnected');
                        }
                    });
                };
                
                readNextChunk();
            };

            // 2. RECEIVER LOGIC (Join)
            const joinSession = (code) => {
                if (code.length !== 6) { setErrorMessage("Enter a valid 6-digit code."); return; }
                setMode('receive');
                setConnectionState('connecting');
                setPairingCode(code);
                setErrorMessage('');

                const peer = new Peer();
                peerRef.current = peer;

                peer.on('open', () => {
                    const conn = peer.connect(APP_PREFIX + code, { reliable: true });
                    connRef.current = conn;

                    conn.on('open', () => setConnectionState('connected'));
                    conn.on('data', (data) => handleReceiveMessage(data));
                    conn.on('close', () => {
                        if (connectionState !== 'completed') setConnectionState('disconnected');
                        connRef.current = null;
                    });
                });

                peer.on('error', (err) => {
                    setErrorMessage("Failed to connect. The code may be invalid or expired.");
                    setMode('receive_setup');
                });
            };

            const handleReceiveMessage = (data) => {
                // Handle Room Full Error
                if (data && data.type === 'error') {
                    setErrorMessage(data.message);
                    cleanupWebRTC();
                    setMode('receive_setup');
                    return;
                }

                if (data && data.type === 'manifest') {
                    setFileManifest(data.files);
                } else if (data && data.type === 'meta') {
                    receivedFileMetaRef.current = data;
                    setCurrentFileIndex(data.fileIndex);
                    setConnectionState('transferring');
                    
                    // SAFEGUARD: Use try-catch for StreamSaver since strict browsers/iframes block it
                    if (window.streamSaver) {
                        try {
                            const fileStream = window.streamSaver.createWriteStream(data.name, {
                                size: data.size
                            });
                            writerRef.current = fileStream.getWriter();
                            receiveBufferRef.current = null; 
                        } catch (err) {
                            console.warn("StreamSaver blocked by browser policy, falling back to RAM.", err);
                            receiveBufferRef.current = [];
                        }
                    } else {
                        receiveBufferRef.current = [];
                    }

                    receivedSizeRef.current = 0;
                    setProgress(0);
                } else if (data && data.type === 'eof') {
                    setProgress(100);
                    
                    if (writerRef.current) {
                        writerRef.current.close();
                        writerRef.current = null;
                    } else if (receiveBufferRef.current) {
                        const meta = receivedFileMetaRef.current;
                        if (meta) {
                            const blob = new Blob(receiveBufferRef.current, { type: meta.mimeType });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = meta.name;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            setTimeout(() => URL.revokeObjectURL(url), 2000);
                        }
                    }
                    
                } else if (data && data.type === 'all_done') {
                    setConnectionState('completed');
                } else {
                    if (writerRef.current) {
                        writerRef.current.write(new Uint8Array(data));
                    } else if (receiveBufferRef.current) {
                        receiveBufferRef.current.push(data);
                    }
                    
                    receivedSizeRef.current += data.byteLength;
                    const meta = receivedFileMetaRef.current;
                    if (meta && meta.size > 0) {
                        setProgress(Math.min(100, Math.round((receivedSizeRef.current / meta.size) * 100)));
                    }
                }
            };

            const copyCode = () => {
                navigator.clipboard.writeText(pairingCode).catch(()=>{});
            };

            // Enhanced File Selection and Drag & Drop
            const handleFileSelect = (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    const newFiles = Array.from(e.target.files);
                    setSelectedFiles(prev => [...prev, ...newFiles]);
                    setFileManifest(prev => [...prev, ...newFiles.map(f => ({ name: f.name, size: f.size }))]);
                    e.target.value = '';
                }
            };

            const handleDragEnter = (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragCounterRef.current++;
                if (e.dataTransfer.items && e.dataTransfer.items.length > 0) {
                    setIsDragging(true);
                }
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragCounterRef.current--;
                if (dragCounterRef.current === 0) {
                    setIsDragging(false);
                }
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.stopPropagation();
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(false);
                dragCounterRef.current = 0;
                
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const newFiles = Array.from(e.dataTransfer.files);
                    setSelectedFiles(prev => [...prev, ...newFiles]);
                    setFileManifest(prev => [...prev, ...newFiles.map(f => ({ name: f.name, size: f.size }))]);
                }
            };

            const totalSelectedSize = fileManifest.length > 0 
                ? fileManifest.reduce((acc, file) => acc + file.size, 0)
                : selectedFiles.reduce((acc, file) => acc + file.size, 0);

            // 3. RENDER UI
            return (
                <div className="w-full flex flex-col items-center">
                    <header className="w-full max-w-2xl flex items-center justify-end mb-12 mt-4 min-h-[40px]">
                        {mode !== 'idle' && (
                            <button onClick={resetApp} className="flex items-center gap-2 text-sm text-slate-500 hover:text-slate-900 font-medium">
                                <IconArrowLeft /> Cancel
                            </button>
                        )}
                    </header>

                    <main className="w-full max-w-lg bg-white rounded-3xl p-8 shadow-xl border border-slate-200">
                        {errorMessage && (
                            <div className="mb-6 bg-red-50 border border-red-200 text-red-600 p-4 rounded-xl flex items-start gap-3">
                                <div className="mt-0.5"><IconAlert /></div>
                                <p className="text-sm font-medium">{errorMessage}</p>
                            </div>
                        )}

                        {mode === 'idle' && (
                            <div className="space-y-6 slide-up">
                                <div className="text-center space-y-2 mb-8">
                                    <h2 className="text-2xl font-bold text-slate-800">What would you like to do?</h2>
                                    <p className="text-slate-500">Choose an option to start a direct transfer.</p>
                                </div>
                                <button onClick={() => setMode('send_setup')} className="w-full py-5 bg-black hover:bg-gray-800 text-white rounded-2xl flex flex-col items-center justify-center gap-2 shadow-lg hover:-translate-y-1 transition-all group">
                                    <div className="p-3 bg-white/20 rounded-full group-hover:scale-110 transition-transform"><IconUpload /></div>
                                    <span className="text-lg font-bold">Send Files</span>
                                </button>
                                <button onClick={() => setMode('receive_setup')} className="w-full py-5 bg-white border-2 border-black text-black hover:bg-gray-50 rounded-2xl flex flex-col items-center justify-center gap-2 shadow-sm hover:-translate-y-1 transition-all group">
                                    <div className="p-3 bg-gray-200 rounded-full group-hover:scale-110 transition-transform"><IconDownload /></div>
                                    <span className="text-lg font-bold">Receive Files</span>
                                </button>
                            </div>
                        )}

                        {mode === 'send_setup' && (
                            <div className="space-y-8 slide-right">
                                <div className="text-center space-y-2">
                                    <h2 className="text-xl font-bold text-slate-800">Send Files</h2>
                                    <p className="text-slate-500 text-sm">Select one or more files to generate a code.</p>
                                </div>
                                <div className="space-y-4">
                                    <div 
                                        className={`relative group cursor-pointer border-2 border-dashed rounded-2xl transition-all duration-200 p-8 flex flex-col items-center text-center ${isDragging ? 'border-black bg-slate-100 scale-[1.02]' : 'border-slate-300 hover:border-black bg-slate-50'}`}
                                        onDragEnter={handleDragEnter}
                                        onDragOver={handleDragOver}
                                        onDragLeave={handleDragLeave}
                                        onDrop={handleDrop}
                                    >
                                        <input type="file" multiple className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onChange={handleFileSelect} />
                                        <div className={`p-4 shadow-sm rounded-full transition-colors mb-3 ${isDragging ? 'bg-black text-white' : 'bg-white text-slate-500 group-hover:bg-black group-hover:text-white'}`}><IconFiles /></div>
                                        <span className="font-semibold text-black text-lg">
                                            {selectedFiles.length > 0 ? 'Select or Drop More Files' : 'Select or Drop Files'}
                                        </span>
                                        {selectedFiles.length === 0 && (
                                            <span className="text-sm text-slate-500 mt-1 pointer-events-none">Drag and drop your files here</span>
                                        )}
                                        {selectedFiles.length > 0 && (
                                            <div className="mt-4 flex flex-col items-center bg-green-50 px-4 py-3 rounded-xl border border-green-100 pointer-events-none relative">
                                                <div className="text-sm text-green-700 font-semibold flex items-center gap-2">
                                                    <IconFileCheck /> 
                                                    {selectedFiles.length === 1 ? selectedFiles[0].name : `${selectedFiles.length} files selected`}
                                                </div>
                                                <div className="text-xs text-green-600 mt-1 font-medium">
                                                    Total size: {formatBytes(totalSelectedSize)}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <button onClick={startHosting} disabled={selectedFiles.length === 0} className="w-full py-4 bg-black hover:bg-gray-800 disabled:bg-slate-200 disabled:text-slate-400 text-white font-bold rounded-xl transition-colors shadow-lg mt-2">
                                        Generate Pairing Code
                                    </button>
                                </div>
                            </div>
                        )}

                        {mode === 'receive_setup' && (
                            <div className="space-y-8 slide-right">
                                <div className="text-center space-y-2">
                                    <h2 className="text-xl font-bold text-slate-800">Receive Files</h2>
                                    <p className="text-slate-500 text-sm">Enter the 6-digit code from the sender.</p>
                                </div>
                                <div className="space-y-6">
                                    <input type="text" maxLength="6" placeholder="000000" id="codeInput" className="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-6 text-center text-4xl font-mono tracking-[0.5em] outline-none focus:border-black transition-all placeholder:text-slate-200" onKeyDown={e => e.key === 'Enter' && joinSession(e.target.value)} />
                                    <button onClick={() => joinSession(document.getElementById('codeInput').value)} className="w-full py-4 bg-black hover:bg-gray-800 text-white font-bold rounded-xl transition-colors shadow-lg">
                                        Connect & Receive
                                    </button>
                                </div>
                            </div>
                        )}

                        {(mode === 'send' || mode === 'receive') && (
                            <div className="space-y-6 py-4 slide-right">
                                
                                {/* Status Header */}
                                <div className="text-center space-y-3">
                                    {connectionState === 'connecting' && (
                                        <React.Fragment>
                                            <div className="text-black flex justify-center"><IconLoader /></div>
                                            <h2 className="text-xl font-bold">{mode === 'send' ? 'Waiting for receiver...' : 'Connecting...'}</h2>
                                        </React.Fragment>
                                    )}
                                    {connectionState === 'connected' && (
                                        <React.Fragment>
                                            <div className="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto"><IconShare /></div>
                                            <h2 className="text-xl font-bold">Peers Connected!</h2>
                                        </React.Fragment>
                                    )}
                                    {connectionState === 'transferring' && (
                                        <React.Fragment>
                                            <div className="w-12 h-12 bg-gray-200 text-black rounded-full flex items-center justify-center mx-auto">
                                                {mode === 'send' ? <IconUpload /> : <IconDownload />}
                                            </div>
                                            <h2 className="text-xl font-bold">{mode === 'send' ? 'Sending Data...' : 'Receiving Data...'}</h2>
                                        </React.Fragment>
                                    )}
                                    {connectionState === 'completed' && (
                                        <React.Fragment>
                                            <div className="w-12 h-12 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto"><IconFileCheck /></div>
                                            <h2 className="text-2xl font-bold text-green-600">Transfer Complete!</h2>
                                        </React.Fragment>
                                    )}
                                    {connectionState === 'disconnected' && (
                                        <React.Fragment>
                                            <div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto"><IconAlert /></div>
                                            <h2 className="text-2xl font-bold text-red-600">Disconnected</h2>
                                        </React.Fragment>
                                    )}
                                </div>

                                {/* Pairing Code Box for Sender */}
                                {mode === 'send' && connectionState === 'connecting' && (
                                    <div className="bg-slate-50 rounded-2xl p-6 text-center border border-slate-200">
                                        <p className="text-sm text-slate-500 mb-2">Share this code with the receiver</p>
                                        <div className="flex items-center justify-center gap-4">
                                            <span className="text-5xl font-mono tracking-widest font-black text-slate-800">{pairingCode}</span>
                                            <button onClick={copyCode} className="p-3 bg-white border border-slate-200 hover:bg-slate-50 rounded-xl"><IconCopy /></button>
                                        </div>
                                    </div>
                                )}

                                {/* Individual Files List UI */}
                                {(connectionState === 'transferring' || connectionState === 'completed' || (mode === 'send' && connectionState === 'connecting' && fileManifest.length > 0)) && (
                                    <div className="bg-slate-50 rounded-2xl p-4 border border-slate-200">
                                        <div className="mb-3 px-2 flex justify-between items-end">
                                            <span className="text-sm font-bold text-slate-700">Files ({fileManifest.length})</span>
                                            <span className="text-xs text-slate-500">{formatBytes(totalSelectedSize)}</span>
                                        </div>
                                        
                                        <div className="max-h-60 overflow-y-auto space-y-2 pr-2">
                                            {fileManifest.map((file, idx) => {
                                                const isCompleted = connectionState === 'completed' || idx < currentFileIndex;
                                                const isTransferring = connectionState === 'transferring' && idx === currentFileIndex;
                                                const isPending = connectionState === 'connecting' || idx > currentFileIndex;

                                                const itemClass = "p-3 rounded-xl border flex items-center justify-between transition-colors " + 
                                                    (isTransferring ? "bg-white border-black shadow-sm" : 
                                                     isCompleted ? "bg-white border-slate-200 opacity-70" : 
                                                     "bg-transparent border-transparent");
                                                
                                                const iconClass = "p-2 rounded-lg " + 
                                                    (isCompleted ? "bg-green-100 text-green-600" : 
                                                     isTransferring ? "bg-gray-100 text-black" : 
                                                     "bg-slate-200 text-slate-400");
                                                
                                                const textClass = "text-sm font-semibold truncate " + (isTransferring ? "text-black" : "text-slate-600");

                                                return (
                                                    <div key={idx} className={itemClass}>
                                                        <div className="flex items-center gap-3 overflow-hidden">
                                                            <div className={iconClass}>
                                                                {isCompleted ? <IconFileCheck /> : <IconFile />}
                                                            </div>
                                                            <div className="truncate">
                                                                <p className={textClass}>{file.name}</p>
                                                                <p className="text-xs text-slate-500">{formatBytes(file.size)}</p>
                                                            </div>
                                                        </div>

                                                        {/* Status Indicator */}
                                                        <div className="ml-4 shrink-0 flex items-center justify-end gap-3">
                                                            {isTransferring && (
                                                                <div className="flex flex-col items-end gap-1 w-16">
                                                                    <span className="text-xs font-bold text-black">{progress}%</span>
                                                                    <div className="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                                                        <div className="h-full bg-black transition-all" style={{ width: progress + '%' }}></div>
                                                                    </div>
                                                                </div>
                                                            )}
                                                            
                                                            {isCompleted && (
                                                                <span className="text-xs font-bold text-green-600"><IconFileCheck /></span>
                                                            )}
                                                            
                                                            {isPending && !isTransferring && <span className="text-xs font-medium text-slate-400">...</span>}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                {(connectionState === 'completed' || connectionState === 'disconnected') && (
                                    <button onClick={resetApp} className="w-full py-4 bg-gray-100 hover:bg-gray-200 text-black font-bold rounded-xl border border-gray-300">
                                        Transfer More Files
                                    </button>
                                )}
                            </div>
                        )}
                    </main>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
